<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="game-wrapper">
    <section class="panel">
      <h1>Tetris</h1>

      <p>Punkte: <span id="score">0</span></p>
      <p>Level: <span id="level">1</span></p>
      <p>Linien: <span id="lines">0</span></p>
      <p>Highscore: <span id="highscore">0</span></p>

      <h2>Nächster Stein</h2>
      <canvas id="next" width="120" height="120"></canvas>

      <button id="pauseBtn">Pause</button>
      <button id="restartBtn">Neustart</button>

      <button id="soundBtn">Sound AN</button>

      <input id="playerName" placeholder="Dein Name" maxlength="15">
      <button id="saveScoreBtn">Score speichern</button>

      <h2>Top 10</h2>
      <ol id="leaderboard"></ol>

      <small>
        ← → bewegen<br>
        ↓ schneller<br>
        ↑ drehen<br>
        ESC Pause<br>
        R Neustart
      </small>
    </section>

    <canvas id="game" width="300" height="600"></canvas>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
